<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès à l'application</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: #007aff;
            color: white;
            font-size: 20px;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 14px;
            text-decoration: none;
            transition: background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,122,255,0.3);
            border: none;
            cursor: pointer;
            width: 80%;
            max-width: 280px;
        }
        .btn:hover {
            background-color: #005bbf;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .note {
            margin-top: 30px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Accéder à l'application</h1>
        <p>Cliquez sur le bouton ci-dessous pour ouvrir l'application dans votre navigateur.</p>
        <a href="https://ais-dev-ept3jgnvy2begrt54lqj76-539328621435.europe-west2.run.app/" class="btn" id="appLink">Ouvrir l'application</a>
        <p class="note">Si le bouton ne fonctionne pas, essayez avec Safari ou Chrome.</p>
    </div>
</body>
</html>
